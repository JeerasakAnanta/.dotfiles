# ==========================
# Prefix & Basic Settings
# ==========================
# ใช้ Ctrl-b เหมือนเดิม (ไม่ต้องแก้)
set -g prefix C-b
bind C-b send-prefix

# เปิดใช้งาน Mouse (เอาไว้ลากคลุมเพื่อก๊อบปี้ Log หรือเลื่อนดู Error ยาวๆ)
set -g mouse on

# เริ่มนับเลข Window/Pane จาก 1 (เลข 0 มันอยู่ไกลนิ้วก้อยครับ)
set -g base-index 1
setw -g pane-base-index 1

# แก้ปัญหาเวลาใช้ Vim แล้วกด Esc แล้วมันดีเลย์
set -s escape-time 0

# รองรับสีแบบ 256 color (เพื่อให้ Syntax Highlighting ใน Code สวยเหมือนใน Terminal ปกติ)
set -g default-terminal "screen-256color"

# ==========================
# Backend Workflow Shortcuts
# ==========================

# แบ่งหน้าจอแบบเห็นภาพง่ายขึ้น
# Prefix + | แบ่งแนวตั้ง (Vertical)
# Prefix + - แบ่งแนวนอน (Horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ใช้ h, j, k, l ในการขยับ Pane (เหมือนการเคลื่อนที่ใน Vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ก๊อบปี้ข้อความแบบ Vim (ใช้ Prefix + [ แล้วกด v เพื่อเลือก y เพื่อก๊อบ)
setw -g mode-keys vi

# ==========================
# Plugins (ช่วยเรื่องการค้างหน้าจอหลังปิดเครื่อง)
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux' # Theme เท่ๆ สำหรับ Dev

# ตั้งค่าให้กู้คืนระบบอัตโนมัติ (หลังเปิดเครื่องใหม่)
set -g @continuum-restore 'on'

# ปรับแต่ง Theme Dracula
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage network"
set -g @dracula-show-left-icon session

# บรรทัดสุดท้ายสำหรับรัน Plugin Manager
run '~/.tmux/plugins/tpm/tpm'
